<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NSFW Chat</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    button {
      padding: 12px 24px;
      margin: 8px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      color: white;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #status {
      margin: 16px 0;
      padding: 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
    }
    #tokens {
      font-weight: bold;
      color: #c084fc;
    }
  </style>
</head>
<body>

  <h1>NSFW Чат</h1>

  <div id="status">Статус: ожидание инициализации...</div>
  <p>Токены: <span id="tokens">?</span></p>

  <button id="btn-balance">Показать баланс</button>
  <button id="btn-spend">Потратить 1 токен</button>
  <button id="btn-spend3">Потратить 3 токена</button>

  <script>
    // ───────────────────────────────────────────────
    //  Глобальные переменные
    // ───────────────────────────────────────────────
    let currentTokens = 0;

    // ───────────────────────────────────────────────
    //  Функции отправки данных боту
    // ───────────────────────────────────────────────
    function sendToBot(obj) {
      if (!window.Telegram?.WebApp) {
        console.error("Telegram.WebApp недоступен");
        document.getElementById("status").textContent = "Ошибка: не внутри Telegram";
        return;
      }

      const jsonString = JSON.stringify(obj);
      console.log("→ Отправляем боту:", jsonString);
      Telegram.WebApp.sendData(jsonString);
    }

    // ───────────────────────────────────────────────
    //  Обновление интерфейса
    // ───────────────────────────────────────────────
    function updateUI(tokens) {
      currentTokens = tokens;
      document.getElementById("tokens").textContent = tokens;
      document.getElementById("btn-spend").disabled = tokens < 1;
      document.getElementById("btn-spend3").disabled = tokens < 3;
    }

    // ───────────────────────────────────────────────
    //  Обработчик сообщений ОТ бота
    // ───────────────────────────────────────────────
    window.addEventListener("message", function(event) {
      // Безопасная проверка источника (можно убрать в продакшене)
      if (event.origin !== "https://web.telegram.org") return;

      try {
        const data = JSON.parse(event.data);
        console.log("← Получено от бота:", data);

        if (data.action === "tokens_update" && typeof data.tokens === "number") {
          updateUI(data.tokens);
          document.getElementById("status").textContent = "Баланс обновлён";
        }
      } catch (err) {
        console.error("Ошибка парсинга сообщения от бота", err);
      }
    });

    // ───────────────────────────────────────────────
    //  Инициализация Web App
    // ───────────────────────────────────────────────
    if (window.Telegram?.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();

      document.getElementById("status").textContent = "Инициализация завершена";

      // Запрашиваем актуальный баланс сразу при открытии
      sendToBot({ action: "get_tokens" });
    } else {
      document.getElementById("status").textContent = "Запустите через Telegram → Web App";
    }

    // ───────────────────────────────────────────────
    //  Обработчики кнопок
    // ───────────────────────────────────────────────
    document.getElementById("btn-balance").onclick = () => {
      sendToBot({ action: "get_tokens" });
    };

    document.getElementById("btn-spend").onclick = () => {
      sendToBot({ action: "spend_tokens", amount: 1 });
    };

    document.getElementById("btn-spend3").onclick = () => {
      sendToBot({ action: "spend_tokens", amount: 3 });
    };
  </script>
</body>
</html>
