<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NSFW Chat</title>
  <script src="prompts.js"></script>
  
  <style>
    /* === оригинальные стили === */
    :root{
      --bg1:#0b0613;
      --bg2:#1a0f33;
      --accent:#8b5cf6;
      --accent2:#c084fc;
      --text:#f3f3ff;
      --glass:rgba(255,255,255,0.06);
      --border:rgba(255,255,255,0.08);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto;
      background:linear-gradient(160deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }
    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 18px;
      background:rgba(0,0,0,.45);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      position:sticky;
      top:0;
      z-index:100;
    }
    .balance{
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      padding:6px 14px;
      border-radius:20px;
      font-size:14px;
      font-weight:600;
      color:white;
      box-shadow:0 0 12px rgba(139,92,246,.6);
      cursor:pointer;
    }
    main{
      flex:1;
      padding:18px;
      overflow-y:auto;
      padding-bottom:90px;
    }
    .screen{display:none;}
    .screen.active{display:block;}
    h1{
      text-align:center;
      margin-bottom:20px;
      font-size:26px;
      background:linear-gradient(90deg,var(--accent2),var(--accent));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .back-btn{
      background:rgba(255,255,255,.1);
      border:none;
      padding:8px 14px;
      border-radius:12px;
      color:white;
      cursor:pointer;
      margin-bottom:16px;
    }
    .characters{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:16px;
    }
    .card{
      background:var(--glass);
      backdrop-filter:blur(14px);
      border-radius:18px;
      overflow:hidden;
      cursor:pointer;
      border:1px solid var(--border);
      transition:.25s;
    }
    .card:hover,
    .card.selected{
      transform:translateY(-6px) scale(1.02);
      border-color:var(--accent);
      box-shadow:0 10px 30px rgba(0,0,0,.6);
    }
    .card img{
      width:100%;
      height:200px;
      object-fit:contain;
      background:black;
    }
    .card-info{
      padding:12px;
      text-align:center;
    }
    .card-info h3{
      margin-bottom:4px;
    }
    .card-info p{
      font-size:13px;
      opacity:.7;
    }
    .chat-container{
      display:flex;
      flex-direction:column;
      height:calc(100vh - 170px);
    }
    .chat-messages{
      flex:1;
      overflow-y:auto;
      padding:10px 0;
    }
    .message{
      margin-bottom:10px;
      padding:12px 16px;
      border-radius:16px;
      max-width:75%;
      line-height:1.4;
      font-size:15px;
    }
    .message.user{
      margin-left:auto;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
    }
    .message.bot{
      background:rgba(255,255,255,.08);
    }
    .chat-input{
      display:flex;
      gap:10px;
      padding:12px;
      position:fixed;
      bottom:60px;
      left:0;
      right:0;
      background:rgba(0,0,0,.45);
      backdrop-filter:blur(10px);
    }
    .chat-input input{
      flex:1;
      padding:12px 16px;
      border-radius:20px;
      border:none;
      background:rgba(255,255,255,.1);
      color:white;
    }
    .chat-input button{
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      border:none;
      padding:0 20px;
      border-radius:20px;
      color:white;
      cursor:pointer;
    }
    .shop-item{
      background:var(--glass);
      border:1px solid var(--border);
      padding:16px;
      border-radius:14px;
      margin-bottom:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .buy-btn{
      background:white;
      color:black;
      border:none;
      padding:8px 16px;
      border-radius:20px;
      font-weight:600;
      cursor:pointer;
    }
    nav{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      height:60px;
      background:rgba(0,0,0,.5);
      backdrop-filter:blur(15px);
      border-top:1px solid var(--border);
      display:flex;
    }
    nav button{
      flex:1;
      border:none;
      background:none;
      color:#aaa;
      font-size:14px;
      cursor:pointer;
    }
    nav button.active{
      color:var(--accent2);
      font-weight:600;
    }
    .fetishes{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:10px;
    }
    .fetish{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:20px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,.08);
      cursor:pointer;
      transition:all .2s;
      font-size:14px;
      min-width:140px;
      justify-content:center;
    }
    .fetish input{
      accent-color:#8b5cf6;
    }
    .fetish:hover{
      transform:scale(1.05);
      border-color:#8b5cf6;
      box-shadow:0 0 10px rgba(139,92,246,.4);
    }
    .fetish:has(input:checked){
      background:linear-gradient(90deg,#8b5cf6,#c084fc);
      color:white;
      border-color:#8b5cf6;
    }
    .start-btn {
      background: linear-gradient(90deg, #8b5cf6, #c084fc);
      color: white;
      border: none;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 6px 20px rgba(139,92,246,0.4);
      transition: all 0.3s;
    }
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(139,92,246,0.6);
    }
  </style>
</head>
<body>
  <header>
    <div>NSFW Chat</div>
    <div class="balance" id="balance-btn">💎 Токены: <span id="balance">15</span></div>
  </header>

  <main>
    <!-- === Здесь оставляй все экраны без изменений === -->
    <!-- Пример: characters-screen, fetishes-screen, chat-screen, shop-screen, profile-screen -->
  </main>

  <nav>
    <button data-tab="characters" class="active">Модели</button>
    <button data-tab="chats">Чаты</button>
    <button data-tab="shop">Магазин</button>
    <button data-tab="profile">Профиль</button>
  </nav>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let tokens = parseInt(localStorage.getItem('tokens')) || 15;

    function updateBalance() {
      document.getElementById('balance').textContent = tokens;
      const profileBal = document.getElementById('profile-balance');
      if (profileBal) profileBal.textContent = tokens;

      // Отправляем данные в бот, чтобы логировать токены
      tg.sendData(JSON.stringify({ action: "get_tokens" }));
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      if (tokens <= 0) {
        addMessage('bot', 'У тебя нет токенов 💎, пополни баланс');
        return;
      }

      tokens--;
      updateBalance();

      // Отправляем списание токена в бот
      tg.sendData(JSON.stringify({
        action: "spend_tokens",
        amount: 1
      }));

      // Остальная логика отправки сообщения LLM остаётся как в твоём коде
      // callLLM(text) и т.д.
    }

    function addMessage(sender, text) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.textContent = text;
      document.getElementById('chat-messages').appendChild(div);
      div.scrollIntoView({behavior:'smooth'});
      return div;
    }

    updateBalance();

    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('chat-input').addEventListener('keypress', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    document.getElementById('balance-btn').addEventListener('click', () => showScreen('shop'));
  </script>
</body>
</html>
